name: ZARBA_Bot
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install firebase-admin axios
      - name: Run Notifier
        env:
          FB_KEY: ${{ secrets.FB_SERVICE_ACCOUNT }}
          TG_TOKEN: "8748134701:AAEevZBGp91-dd9q9jgo3aYqsPvenTgUkD0"
          TG_ID: "5736535127"
        run: |
          node -e "
          const admin = require('firebase-admin');
          const axios = require('axios');

          async function send(text) {
            try {
              await axios.post('https://api.telegram.org/bot' + process.env.TG_TOKEN + '/sendMessage', {
                chat_id: process.env.TG_ID,
                text: text,
                parse_mode: 'HTML'
              });
            } catch (e) { console.error('Ошибка TG:', e.response ? e.response.data : e.message); }
          }

          admin.initializeApp({credential: admin.credential.cert(JSON.parse(process.env.FB_KEY))});
          const db = admin.firestore();

          async function go() {
            console.log('Проверка связи...');
            await send('🚀 <b>Бот ZARBA запущен!</b>\nПроверяю новые треки...');

            const snap = await db.collection('tracks').limit(5).get();
            if (snap.empty) {
              await send('❌ В базе данных нет треков в коллекции tracks');
              return;
            }

            for (const doc of snap.docs) {
              const t = doc.data();
              const msg = '<b>🔥 Новый трек на ZARBA!</b>\n\n' +
                          '🎵 Исполнитель: <b>' + (t.artist || '...') + '</b>\n' +
                          '🎶 Название: <b>' + (t.title || '...') + '</b>\n\n' +
                          '🔗 <a href=\"https://zarba.ru\">Слушать на сайте</a>';
              await send(msg);
              console.log('Отправлено: ' + t.title);
            }
          }
          go().catch(async (err) => {
            await send('⚠️ Ошибка скрипта: ' + err.message);
            console.error(err);
          });"