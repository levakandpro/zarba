name: ZARBA_Bot
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: npm install firebase-admin axios
      - name: Run Notifier
        env:
          FB_KEY: ${{ secrets.FB_SERVICE_ACCOUNT }}
          TG_TOKEN: "8748134701:AAEevZBGp91-dd9q9jgo3aYqsPvenTgUkD0"
          TG_ID: "5736535127"
        run: |
          node -e "
          const admin = require('firebase-admin');
          const axios = require('axios');
          admin.initializeApp({credential: admin.credential.cert(JSON.parse(process.env.FB_KEY))});
          const db = admin.firestore();

          async function go() {
            const snap = await db.collection('tracks').get();
            const now = Date.now();
            const checkInterval = 15 * 60 * 1000; 

            if (snap.empty) {
              console.log('Коллекция пуста');
              return;
            }

            for (const doc of snap.docs) {
              const t = doc.data();
              if (!t.createdAt) continue;

              // Обработка даты (Timestamp или Date)
              let trackDate = t.createdAt.seconds ? t.createdAt.seconds * 1000 : new Date(t.createdAt).getTime();
              
              if (now - trackDate < checkInterval) {
                const msg = '<b>🔥 НОВЫЙ ТРЕК НА ZARBA!</b>\n\n' +
                            '🎵 Артист: <b>' + (t.artist || '...') + '</b>\n' +
                            '🎶 Трек: <b>' + (t.title || '...') + '</b>\n\n' +
                            '🔗 <a href=\"https://zarba.ru\">Открыть ZARBA</a>';
                
                await axios.post('https://api.telegram.org/bot' + process.env.TG_TOKEN + '/sendMessage', {
                  chat_id: process.env.TG_ID,
                  text: msg,
                  parse_mode: 'HTML'
                });
              }
            }
          }
          go().catch(console.error);"