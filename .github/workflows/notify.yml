name: ZARBA_Bot
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install firebase-admin axios
      - name: Run Notifier
        env:
          FB_KEY: ${{ secrets.FB_SERVICE_ACCOUNT }}
          TG_TOKEN: "8748134701:AAEevZBGp91-dd9q9jgo3aYqsPvenTgUkD0"
          TG_ID: "5736535127"
        run: |
          node -e "
          const admin = require('firebase-admin');
          const axios = require('axios');
          admin.initializeApp({credential: admin.credential.cert(JSON.parse(process.env.FB_KEY))});
          const db = admin.firestore();

          async function go() {
            // Пытаемся найти коллекцию (и в маленьком, и в большом регистре)
            let snap = await db.collection('tracks').get();
            if (snap.empty) {
                snap = await db.collection('Tracks').get();
            }

            const now = Date.now();
            const checkInterval = 15 * 60 * 1000; 

            if (snap.empty) {
              // Если всё равно пусто, выведем в лог, что вообще есть в базе
              const collections = await db.listCollections();
              const names = collections.map(c => c.id).join(', ');
              await axios.post('https://api.telegram.org/bot' + process.env.TG_TOKEN + '/sendMessage', {
                chat_id: process.env.TG_ID,
                text: '❌ Треков нет. Доступные коллекции: ' + (names || 'пусто')
              });
              return;
            }

            for (const doc of snap.docs) {
              const t = doc.data();
              if (!t.createdAt) continue;

              try {
                const [d, time] = t.createdAt.split(', ');
                const [day, month, year] = d.split('.');
                const dateObj = new Date(year, month - 1, day, ...time.split(':'));
                
                if (now - dateObj.getTime() < checkInterval) {
                  const msg = '<b>🔥 Новый трек на ZARBA!</b>\n\n' +
                              '🎵 Исполнитель: <b>' + (t.artist || '...') + '</b>\n' +
                              '🎶 Название: <b>' + (t.title || '...') + '</b>\n\n' +
                              '🔗 <a href=\"https://zarba.ru\">Слушать на сайте</a>';
                  
                  await axios.post('https://api.telegram.org/bot' + process.env.TG_TOKEN + '/sendMessage', {
                    chat_id: process.env.TG_ID,
                    text: msg,
                    parse_mode: 'HTML'
                  });
                }
              } catch (e) { console.log('Ошибка даты'); }
            }
          }
          go().catch(console.error);"