name: ZARBA_Bot
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: npm install firebase-admin axios
      - name: Run Notifier
        env:
          FB_KEY: ${{ secrets.FB_SERVICE_ACCOUNT }}
          TG_TOKEN: "8748134701:AAEevZBGp91-dd9q9jgo3aYqsPvenTgUkD0"
          TG_ID: "5736535127"
        run: |
          node -e "
          const admin = require('firebase-admin');
          const axios = require('axios');
          admin.initializeApp({credential: admin.credential.cert(JSON.parse(process.env.FB_KEY))});
          const db = admin.firestore();

          async function send(text) {
            await axios.post('https://api.telegram.org/bot' + process.env.TG_TOKEN + '/sendMessage', {
              chat_id: process.env.TG_ID, text: text, parse_mode: 'HTML'
            });
          }

          async function go() {
            console.log('Начинаю проверку...');
            await send('📣 <b>Бот на связи!</b>\nПроверяю базу данных...');

            const snap = await db.collection('tracks').get();
            if (snap.empty) {
              await send('❌ Коллекция tracks пуста в проекте ' + JSON.parse(process.env.FB_KEY).project_id);
              return;
            }

            let found = 0;
            const now = Date.now();

            for (const doc of snap.docs) {
              const t = doc.data();
              if (!t.createdAt) continue;

              // ВРЕМЕННО: Убираем фильтр 15 минут, чтобы просто увидеть хоть ОДИН трек
              const msg = '<b>✅ Нашел трек в базе!</b>\n\n🎵 ' + t.artist + ' - ' + t.title + '\n📅 Дата в базе: ' + t.createdAt;
              await send(msg);
              found++;
              if (found >= 2) break; // Пришлем только первые два, чтоб не спамить
            }

            if (found === 0) await send('❓ Треки есть, но у них нет поля createdAt');
          }
          go().catch(e => send('⛔️ Ошибка: ' + e.message));"