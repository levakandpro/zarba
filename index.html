<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZARBA — Музыкальная Экосистема Таджикского Рэпа</title>
    <link rel="icon" type="image/png" href="assets/favicon black.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container { position: relative; display: flex; align-items: center; }
        .user-pill { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.05); padding: 4px 4px 4px 12px; border-radius: 30px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .user-pill:hover { border-color: #ff0055; background: rgba(255, 0, 85, 0.1); }
        .user-pill-name { color: #fff; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .user-pill-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #ff0055; object-fit: cover; }
        .user-dropdown { position: absolute; top: calc(100% + 10px); right: 0; background: #111; border: 1px solid #333; border-radius: 12px; min-width: 180px; display: none; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.6); z-index: 1000; overflow: hidden; }
        .auth-container.active .user-dropdown { display: flex; }
        .dropdown-item { padding: 12px 20px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; text-align: left; }
        .dropdown-item:hover { background: #1a1a1a; color: #ff0055; }
        .dropdown-item.exit:hover { color: #ff4444; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-area" onclick="location.reload()">
            <div class="logo-container">
                <div class="logo-icon-wrapper"><img src="assets/white.svg" alt="ZARBA" class="logo-icon"></div>
                <div class="logo-text-section">
                    <h1 class="logo-main">ZARBA</h1>
                    <p class="logo-tagline">МУЗЫКАЛЬНАЯ ЭКО СИСТЕМА ТАДЖИКСКОГО РЭП</p>
                </div>
            </div>
        </div>
        <nav class="main-nav">
            <button onclick="showPage('home')">ГЛАВНАЯ</button>
            <button onclick="showPage('artists')">АРТИСТЫ</button>
            <button onclick="showPage('charts')">ТОП 100</button>
            <button onclick="showPage('media')">Z-MEDIA</button>
            <button onclick="showPage('bazar')">BAZAR</button>
            <button onclick="showPage('collabs')">COLLABS</button>
            <button onclick="showPage('playlists')">ПЛЕЙЛИСТЫ</button>
            <button onclick="showPage('hall')">ЗАЛ СЛАВЫ</button>
        </nav>
        <div id="auth-section" class="auth-container">
            <button class="btn-google-auth" onclick="window.signInWithGoogle()">ВХОД</button>
        </div>
    </header>

    <main id="app-content"></main>

    <script src="js/pages/home.js"></script>
    <script src="js/pages/artists.js"></script>
    <script src="js/pages/charts.js"></script>
    <script src="js/pages/media.js"></script>
    <script src="js/pages/bazar.js"></script>
    <script src="js/pages/collab.js"></script>
    <script src="js/pages/playlists.js"></script>
    <script src="js/pages/hall-of-fame.js"></script>
    
    <script src="js/pages/profile.js"></script>
    
    <script src="js/components/chat.js"></script>
    <script src="js/main.js"></script>

    <script>
        function openModal(name) { const m = document.getElementById(name + '-modal'); if (m) m.style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        document.addEventListener('click', (e) => { 
            const a = document.getElementById('auth-section'); 
            if (a && !a.contains(e.target)) a.classList.remove('active'); 
        });
    </script>
</body>
</html>
